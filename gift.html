<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift & Craft Items - StationeryHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
/* SAME CSS */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}
.container {
    width: 90%;
    margin: auto;
    padding: 20px 0;
}
header {
    background: #ff6b6b;
    color: white;
    padding: 15px 0;
}
header .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo h2 { font-size: 24px; }
.logo span { color: black; }
.search-bar { display: flex; width: 40%; }
.search-bar input {
    width: 100%; padding: 8px; border: none; outline: none;
    border-radius: 5px 0 0 5px;
}
.search-bar button {
    padding: 8px 12px; border: none;
    background: black; color: white; cursor: pointer;
    border-radius: 0 5px 5px 0;
}
.nav-icons a {
    color: white; margin-left: 15px;
    font-size: 18px; text-decoration: none;
}
.navbar { background: #333; }
.navbar ul {
    display: flex; justify-content: center; list-style: none;
}
.navbar ul li { margin: 10px 15px; }
.navbar ul li a {
    color: white; text-decoration: none; font-weight: bold;
}
.navbar ul li a:hover,
.navbar ul li a.active { color: #ff6b6b; }

h2 { text-align: center; margin-bottom: 10px; }
p { text-align: center; color: #555; }

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}
.product-card {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}
.product-card:hover { transform: translateY(-5px); }
.product-card img {
    width: 100%; height: 180px;
    object-fit: cover; border-radius: 10px;
}
.product-card h3 { margin: 10px 0; }
.product-card .price {
    font-size: 18px;
    color: #ff6b6b;
    font-weight: bold;
}
.product-card button {
    background: #ff6b6b;
    color: white; border: none;
    padding: 10px 15px;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}
.product-card button:hover { background: #e55a5a; }

footer {
    margin-top: 30px;
    padding: 15px;
    background: #333;
    color: white;
    text-align: center;
}
    </style>
</head>

<body>

<!-- Header -->
<header>
<div class="container">
<div class="logo">
<h2>Stationery<span>Hub</span></h2>
</div>

<div class="search-bar">

</div>

<div class="nav-icons">

</div>
</div>
</header>

<!-- Navbar -->
<nav class="navbar">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="shop.html">Shop All</a></li>
<li><a href="gift.html" class="active">Gift</a></li>

</nav>

<!-- Footer -->
<footer>

<p>© 2026 StationeryHub</p>
</div>

</body>
</html>
